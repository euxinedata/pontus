apiVersion: apps/v1
kind: Deployment
metadata:
  name: kolkhis-backend
  namespace: kolkhis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kolkhis-backend
  template:
    metadata:
      labels:
        app: kolkhis-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432; do sleep 2; done"]
        - name: run-migrations
          image: ghcr.io/euxinedata/kolkhis-backend:8ee4f2f
          command: ["uv", "run", "alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
          envFrom:
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: kolkhis-app-secrets
            - secretRef:
                name: kolkhis-s3-secrets
            - secretRef:
                name: kolkhis-worker-secrets
      containers:
        - name: backend
          image: ghcr.io/euxinedata/kolkhis-backend:8ee4f2f
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: FRONTEND_URL
              value: https://app.euxine.eu
            - name: WORKER_MODE
              value: remote
            - name: WORKER_LOCATION
              value: nbg1
            - name: WORKER_SERVER_TYPE
              value: cpx42
            - name: GITEA_URL
              value: http://gitea:3000
            - name: SHELL_SSH_HOST
              value: shell
            - name: SHELL_SSH_PORT
              value: "22"
            - name: SHELL_SSH_USER
              value: shelluser
            - name: SHELL_SSH_KEY_PATH
              value: /etc/shell-ssh/id_ed25519
            - name: HOMES_PATH
              value: /app/data/homes
          envFrom:
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: kolkhis-app-secrets
            - secretRef:
                name: kolkhis-s3-secrets
            - secretRef:
                name: kolkhis-worker-secrets
            - secretRef:
                name: gitea-credentials
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: homes
              mountPath: /app/data/homes
            - name: shell-ssh-key
              mountPath: /etc/shell-ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
      volumes:
        - name: homes
          persistentVolumeClaim:
            claimName: homes-pvc
        - name: shell-ssh-key
          secret:
            secretName: shell-ssh-keys
            defaultMode: 0400
