apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: kolkhis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/lib/gitea"]
          volumeMounts:
            - name: gitea-data
              mountPath: /var/lib/gitea
        - name: create-db
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tc \
                "SELECT 1 FROM pg_database WHERE datname = 'gitea'" | grep -q 1 || \
              PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c \
                "CREATE DATABASE gitea"
          envFrom:
            - secretRef:
                name: postgres-credentials
      containers:
        - name: gitea
          image: gitea/gitea:1.23-rootless
          ports:
            - containerPort: 3000
          env:
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: postgres:5432
            - name: GITEA__database__NAME
              value: gitea
            - name: GITEA__database__USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__server__DISABLE_SSH
              value: "true"
            - name: GITEA__server__ROOT_URL
              value: http://gitea:3000
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
          envFrom:
            - secretRef:
                name: gitea-credentials
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    until wget -qO /dev/null http://localhost:3000/api/v1/version 2>/dev/null; do sleep 2; done
                    gitea admin user list --admin 2>/dev/null | grep -q "$GITEA_ADMIN_USER" && exit 0
                    gitea admin user create \
                      --username "$GITEA_ADMIN_USER" \
                      --password "$GITEA_ADMIN_PASSWORD" \
                      --email "$GITEA_ADMIN_EMAIL" \
                      --admin || true
          volumeMounts:
            - name: gitea-data
              mountPath: /var/lib/gitea
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-pvc
