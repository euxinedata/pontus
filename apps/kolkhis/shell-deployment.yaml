apiVersion: apps/v1
kind: Deployment
metadata:
  name: kolkhis-shell
  namespace: kolkhis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kolkhis-shell
  template:
    metadata:
      labels:
        app: kolkhis-shell
    spec:
      containers:
        - name: shell
          image: ghcr.io/euxinedata/kolkhis-shell:latest
          ports:
            - containerPort: 22
          volumeMounts:
            - name: homes
              mountPath: /home
      volumes:
        - name: homes
          persistentVolumeClaim:
            claimName: homes-pvc
