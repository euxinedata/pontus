apiVersion: apps/v1
kind: Deployment
metadata:
  name: kolkhis-shell
  namespace: kolkhis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kolkhis-shell
  template:
    metadata:
      labels:
        app: kolkhis-shell
    spec:
      containers:
        - name: shell
          image: ghcr.io/euxinedata/kolkhis-shell:latest
          ports:
            - containerPort: 22
          env:
            - name: SHELL_ORG_UUID
              valueFrom:
                secretKeyRef:
                  name: kolkhis-app-secrets
                  key: SHELL_ORG_UUID
          volumeMounts:
            - name: homes
              mountPath: /home
              subPathExpr: "$(SHELL_ORG_UUID)"
      volumes:
        - name: homes
          persistentVolumeClaim:
            claimName: homes-pvc
