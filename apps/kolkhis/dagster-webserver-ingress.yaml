apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dagster-webserver
  namespace: kolkhis
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: kolkhis-dagster-basic-auth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - dagster.euxine.eu
      secretName: dagster-webserver-tls
  rules:
    - host: dagster.euxine.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dagster-webserver
                port:
                  number: 80
