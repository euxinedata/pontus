apiVersion: batch/v1
kind: Job
metadata:
  name: lakekeeper-setup
  namespace: kolkhis
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-lakekeeper
          image: curlimages/curl:latest
          command: ["sh", "-c", "until curl -sf http://lakekeeper:8181/health; do sleep 2; done"]
      containers:
        - name: setup
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - |
              # Create default project (idempotent — 409 if exists)
              # Per-org warehouses are created by the backend on org creation
              curl -sf http://lakekeeper:8181/management/v1/project \
                -H 'Content-Type: application/json' \
                -d '{"project-id": "00000000-0000-0000-0000-000000000000", "project-name": "default"}' \
                || echo "Project already exists"
